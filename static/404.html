<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Page not found. Return to the PDF to Markdown converter." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f6f4ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1011" media="(prefers-color-scheme: dark)" />
  <title>Page not found · PDF → Markdown</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css?v=5" />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("pdfmd:theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.setAttribute("data-theme", saved);
          return;
        }
      } catch (e) { /* localStorage blocked */ }
      if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>
<body class="page-empty">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="mast">
    <div class="mast-row">
      <a class="brand" href="/" aria-label="PDF to Markdown home">
        <span class="brand-glyph" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M14 3v5h5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-name">pdf → md</span>
      </a>
      <div class="mast-actions">
        <button type="button" id="theme-toggle" class="theme-toggle"
                aria-label="Switch color theme" title="Switch theme">
          <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main" class="empty-stage" tabindex="-1">
    <p class="empty-code" aria-hidden="true">404</p>
    <h1 class="empty-title">This page isn’t here</h1>
    <p class="empty-text">
      The address may be wrong, or the page was moved.
      Head back to convert a PDF.
    </p>
    <a class="btn btn-primary empty-cta" href="/">Back to converter</a>
  </main>

  <footer class="foot foot-site">
    <span class="foot-credit">
      Built by
      <a class="foot-link" href="https://github.com/praisel-ekpenyong" target="_blank" rel="noopener noreferrer">Praisel Ekpenyong</a>
      · MIT
    </span>
  </footer>

  <script src="/static/theme.js?v=1"></script>
</body>
</html>
